<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">
    <head>
        <title>Skin Predictor</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>Skin Predictor</h1>
        <p>Upload a skin image for prediction.</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit">Upload</button>
        </form>

        <div th:if="${message}">
            <p th:text="${message}"></p>
        </div>

        <div th:if="${fileName}">
            <p>Uploaded Image: <span th:text="${fileName}"></span></p>
        </div>

        <div th:if="${label}">
            <h2>Prediction Result</h2>
            <p>Label: <span th:text="${label}"></span></p>
            <p>Score: <span th:text="${score}"></span></p>
            <p>Threshold: <span th:text="${threshold}"></span></p>
        </div>
    </body>
</html>
